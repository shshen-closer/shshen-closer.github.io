- title: "Towards higher quality and fewer hallucinations: A multi-agent collaboration framework for LLMs"
  authors: "<strong>Shuanghong Shen</strong>, Dengdi Sun, Zixuan Qin, Yu Su, Linbo Zhu, Junyu Lu, Zhenya Huang, Shijin Wang."
  venue: "<em>Information Processing & Management, 2026.</em> [J]"
  link: "https://www.sciencedirect.com/science/article/abs/pii/S0306457326003444"
  image: "/images/papers/paper15.png"
  intro: "Large language models are prone to generating plausible but incorrect information (hallucinations). This paper proposes a multi-agent collaboration framework where specialized agents work together to verify and refine each other's outputs, significantly improving response quality and reducing hallucination rates across diverse tasks while maintaining generation efficiency."

- title: "基于视觉语言模型的多模态学生参与度预测方法"
  authors: "<strong>Shuanghong Shen</strong>, Zixuan Qin, Yu Su, Shijin Wang, Zhenya Huang, Dengdi Sun✉."
  venue: "<em>Acta Automatica Sinica (自动化学报), 2026.</em> [J]"
  link: "https://www.aas.net.cn/cn/article/doi/10.16383/j.aas.c260173"
  image: "/images/papers/paper16.png"
  intro: "To address the limitations of general vision-language models in student engagement prediction (SEP)—such as cross-domain semantic gaps and lack of sensitivity to subtle facial cues—this paper proposes VLM-SEP. By decoupling multimodal video streams into orthogonal facial and body-pose features and integrating educational psychology rules, VLM-SEP achieves highly accurate and interpretable student engagement prediction."

- title: "Towards Fine-grained Knowledge Tracing by Hierarchical Fusion of Multiple Question Attributes"
  authors: "<strong>Shuanghong Shen</strong>, Qi Mo, Zhenya Huang, Yu Su, Linbo Zhu, Junyu, Qi Liu."
  venue: "<em>ACM Transactions on Information Systems, 2026, accepted.</em> [J]"
  link: ""
  image: "/images/papers/paper1.png"
  intro: "Knowledge tracing models typically treat each question as a single knowledge concept, ignoring the rich multi-attribute structure of real exam questions. This paper proposes a hierarchical fusion approach that jointly encodes multiple question attributes (e.g., concept tags, difficulty, type) at different granularities, enabling finer-grained modeling of student knowledge states and improving prediction accuracy on standard benchmarks."

- title: "GLP-fusion: A Hierarchical Multimodal Fusion Framework for Robust Student Engagement Prediction"
  authors: "Zixuan Qin, <strong>Shuanghong Shen</strong>✉, Dengdi Sun, Keyu Zhu, Zhenya Huang, Qi Liu, Shijin Wang."
  venue: "<em>IEEE Transactions on Multimedia, 2026, accepted.</em> [J]"
  link: ""
  image: "/images/papers/paper2.png"
  intro: "Accurately predicting student engagement in online learning is challenging due to the heterogeneity of multimodal signals (video, audio, physiological). GLP-fusion introduces a hierarchical fusion framework that progressively integrates global context, local temporal dynamics, and personal behavioral patterns, achieving robust engagement prediction even under noisy or missing modality conditions."

- title: "LLM-EPSP: Large language model empowered early prediction of student performance"
  authors: "Huawei Zhou,  <strong>Shuanghong Shen</strong>✉, Yu Su, Yongchun Miao, Qi Liu, Linbo Zhu, Junyu Lu, Zhenya Huang."
  venue: "<em>Information Processing & Management, 2026, 63(1): 104351.</em> [J]"
  link: "https://www.sciencedirect.com/science/article/pii/S0306457325002924"
  image: "/images/papers/paper3.png"
  intro: "Early prediction of student performance allows timely intervention, but existing methods struggle to leverage the rich semantic information in course materials and student interactions. LLM-EPSP harnesses large language models to extract deep semantic features from learning records, significantly improving early-stage prediction accuracy and providing interpretable risk signals for educators."

- title: "Practicing in quiz, assessing in quiz: A Quiz-based neural network approach for knowledge tracing"
  authors: "<strong>Shuanghong Shen</strong>, Qi Liu, Zhenya Huang, Linbo Zhu, Junyu Lu, Kai Zhang."
  venue: "<em>Neural Networks, 2025: 107797.</em> [J]"
  link: "https://www.sciencedirect.com/science/article/pii/S089360802500677X"
  image: "/images/papers/paper4.png"
  intro: "Traditional knowledge tracing models focus on individual question-answer interactions, overlooking the structured nature of quizzes as a learning unit. This paper proposes a quiz-centric neural network that models both intra-quiz dependencies and inter-quiz knowledge evolution, better reflecting how students actually practice and are assessed in real educational scenarios."

- title: "Harnessing code domain insights: Enhancing programming Knowledge Tracing with Large Language Models"
  authors: "Xinjie Sun, Qi Liu, Kai Zhang, <strong>Shuanghong Shen</strong>✉, Lina Yang, Hui Li."
  venue: "<em>Knowledge-Based Systems, 2025, 317: 113396.</em> [J]"
  link: "https://www.sciencedirect.com/science/article/pii/S0950705125004435"
  image: "/images/papers/paper5.png"
  intro: "Programming knowledge tracing is uniquely challenging because code exercises carry rich structural and semantic information beyond simple right/wrong labels. This paper leverages LLMs to extract code domain insights—such as algorithmic concepts and error patterns—as auxiliary signals, substantially enhancing the accuracy of tracing students' programming skill acquisition."

- title: "ScholarGEC: Enhancing Controllability of Large Language Model for Chinese Academic Grammatical Error Correction"
  authors: "Zixiao Kong, Xianquan Wang, <strong>Shuanghong Shen</strong>✉, Keyu Zhu, Huibo Xu, Yu Su."
  venue: "<em>Proceedings of the AAAI Conference on Artificial Intelligence. 2025, 39(23): 24339-24347.</em> [C]"
  link: "https://ojs.aaai.org/index.php/AAAI/article/view/34611"
  image: "/images/papers/paper6.png"
  intro: "Chinese academic writing contains domain-specific grammatical patterns that general GEC systems fail to handle well. ScholarGEC introduces a controllable LLM-based framework that incorporates academic style constraints and error-type guidance, enabling more precise and context-aware grammatical error correction tailored to scholarly Chinese text."

- title: "Mitigating Redundancy in Deep Recommender Systems: A Field Importance Distribution Perspective"
  authors: "Xianquan Wang, Likang Wu, Zhi Li, Haitao Yuan, <strong>Shuanghong Shen</strong>✉, Huibo Xu, Yu Su, Chenyi Lei."
  venue: "<em>Proceedings of the 31st ACM SIGKDD Conference on Knowledge Discovery and Data Mining V. 1. 2025: 1515-1526.</em> [C]"
  link: "https://dl.acm.org/doi/abs/10.1145/3690624.3709275"
  image: "/images/papers/paper7.png"
  intro: "Deep recommender systems often suffer from feature redundancy across input fields, leading to wasted model capacity and degraded performance. This paper analyzes the problem from a field importance distribution perspective and proposes a principled method to identify and suppress redundant fields, yielding more efficient and accurate recommendations on large-scale industrial datasets."

- title: "A Survey of Knowledge Tracing: Models, Variants, and Applications"
  authors: "<strong>Shuanghong Shen</strong>, Qi Liu, Zhenya Huang, Yonghe Zheng, Minghao Yin, Minjuan Wang, Enhong Chen."
  venue: "<em>IEEE Transactions on Learning Technologies, 2024, 17: 1858-1879.</em> [J]"
  link: "https://ieeexplore.ieee.org/abstract/document/10494775"
  image: "/images/papers/paper8.png"
  intro: "This comprehensive survey systematically reviews over 100 knowledge tracing models, organizing them into a unified taxonomy covering deep learning-based, cognitive theory-inspired, and graph-based variants. It also summarizes key datasets, evaluation protocols, and open challenges, serving as a thorough reference for researchers entering the intelligent education field."

- title: "Constructing a Confidence-guided Multigraph Model for cognitive diagnosis in personalized learning"
  authors: "Yu Su, Ze Han, <strong>Shuanghong Shen</strong>✉, Xuejie Yang, Zhenya Huang, Jinze Wu, Huawei Zhou, Qi Liu."
  venue: "<em>Expert Systems with Applications, 2024, 252: 124259.</em> [J]"
  link: "https://www.sciencedirect.com/science/article/abs/pii/S0957417424011254"
  image: "/images/papers/paper9.png"
  intro: "Cognitive diagnosis aims to infer students' mastery of fine-grained knowledge concepts, but existing models often ignore the uncertainty in student responses. This paper constructs a confidence-guided multigraph model that explicitly captures response confidence alongside concept relationships, leading to more reliable and interpretable cognitive diagnosis for personalized learning."

- title: "Global and Local Neural Cognitive Modeling for Student Performance Prediction"
  authors: "Yu Su, <strong>Shuanghong Shen</strong>✉, Enhong Chen, Qi Liu, Zhenya Huang, Wei Huang, Yu Yin, Yu Su, Shijin Wang."
  venue: "<em>Expert Systems with Applications, 2024, 237: 121637.</em> [J]"
  link: "https://www.sciencedirect.com/science/article/abs/pii/S0957417423021395"
  image: "/images/papers/paper10.png"
  intro: "Student performance prediction requires capturing both long-range learning trends and short-term behavioral fluctuations. This paper proposes a dual-branch neural cognitive model that jointly learns global learning trajectories and local interaction patterns, outperforming single-scale baselines and providing richer representations for downstream educational applications."

- title: "Monitoring Student Progress for Learning Process-Consistent Knowledge Tracing"
  authors: "<strong>Shuanghong Shen</strong>, Enhong Chen, Qi Liu, Zhenya Huang, Wei Huang, Yu Yin, Yu Su, Shijin Wang."
  venue: "<em>IEEE Transactions on Knowledge and Data Engineering, 2023, 35(8): 8213-8227.</em> [J]"
  link: "https://ieeexplore.ieee.org/abstract/document/9950313"
  image: "/images/papers/paper11.png"
  intro: "Existing knowledge tracing models often fail to maintain consistency between a student's observed learning behaviors and their predicted knowledge state. This paper introduces a progress monitoring mechanism that tracks learning dynamics over time and enforces process-consistent constraints, resulting in more coherent and accurate knowledge state estimation published in IEEE TKDE."

- title: "Assessing Student’s Dynamic Knowledge State by Exploring the Question Difficulty Effect"
  authors: "<strong>Shuanghong Shen</strong>, Zhenya Huang, Qi Liu, Yu Su, Shijin Wang, Enhong Chen."
  venue: "<em>Proceedings of the 45th international ACM SIGIR conference on research and development in information retrieval. 2022: 427-437.</em> [C]"
  link: "https://dl.acm.org/doi/abs/10.1145/3477495.3531939"
  image: "/images/papers/paper12.png"
  intro: "Question difficulty is a critical but often overlooked factor in knowledge tracing. This SIGIR paper proposes a difficulty-aware model that explicitly disentangles the effect of question difficulty from student ability, enabling more accurate and interpretable assessment of students' dynamic knowledge states across varying difficulty levels."

- title: "Learning Process-consistent Knowledge Tracing"
  authors: "<strong>Shuanghong Shen</strong>, Qi Liu, Enhong Chen, Zhenya Huang, Wei Huang, Yu Yin, Yu Su, Shijin Wang."
  venue: "<em>Proceedings of the 27th ACM SIGKDD conference on knowledge discovery & data mining. 2021: 1452-1460.</em> [C]"
  link: "https://dl.acm.org/doi/abs/10.1145/3447548.3467237"
  image: "/images/papers/paper13.png"
  intro: "Standard knowledge tracing models treat student responses as independent events, ignoring the inherent consistency constraints of a real learning process (e.g., a student who masters a concept should not regress without cause). This KDD paper formalizes learning process consistency as an explicit training objective, significantly improving both predictive performance and the interpretability of traced knowledge states."

- title: "Convolutional Knowledge Tracing: Modeling Individualization in Student Learning Process"
  authors: "<strong>Shuanghong Shen</strong>, Qi Liu, Enhong Chen, Han Wu, Zhenya Huang, Weihao Zhao, Yu Su, Haiping Ma, Shijin Wang."
  venue: "<em>Proceedings of the 43rd international ACM SIGIR conference on research and development in information retrieval. 2020: 1857-1860.</em> [C]"
  link: "https://dl.acm.org/doi/abs/10.1145/3397271.3401288"
  image: "/images/papers/paper14.png"
  intro: "Different students exhibit distinct learning patterns even when studying the same material. This SIGIR paper proposes a convolutional knowledge tracing model that uses local convolutional filters to capture individualized learning behaviors within sequential interaction data, offering a lightweight yet effective alternative to recurrent architectures."
